name: Build and Deploy

on:
  push:
    branches: [ "main" ]

env:
  DEPLOY_DIR: /root/music_list

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      frontend_image: ${{ steps.vars.outputs.frontend_image }}
      backend_image: ${{ steps.vars.outputs.backend_image }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image names (lowercase)
        id: vars
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "frontend_image=ghcr.io/${REPO}/frontend" >> $GITHUB_OUTPUT
          echo "backend_image=ghcr.io/${REPO}/backend"   >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.frontend_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.backend_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Prepare remote directory
        run: |
          sshpass -p "${{ secrets.SUDO_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "mkdir -p $DEPLOY_DIR/data && chmod 777 $DEPLOY_DIR/data"

      - name: Copy docker-compose to server
        run: |
          sshpass -p "${{ secrets.SUDO_PASSWORD }}" scp \
            -o StrictHostKeyChecking=no \
            docker-compose.yml \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:$DEPLOY_DIR/

      - name: Deploy
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          sshpass -p "${{ secrets.SUDO_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "

            cd $DEPLOY_DIR &&

            echo '${{ secrets.GITHUB_TOKEN }}' | \
              docker login ghcr.io -u '${{ github.actor }}' --password-stdin &&

            export GITHUB_REPOSITORY='${REPO}' &&

            docker compose pull &&
            docker compose up -d &&
            docker image prune -f
          "