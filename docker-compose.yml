services:

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/db.sqlite
    volumes:
      # Volume для SQLite — данные сохраняются между перезапусками
      - sqlite_data:/app/data
    expose:
      - "3000"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # Все запросы к API идут через /api — nginx проксирует на backend
        VITE_API_URL: https://${DOMAIN}/api
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Запускается вручную для получения сертификата, потом для обновления
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h;
             done"

volumes:
  # Именованный volume — Docker хранит его независимо от контейнеров
  sqlite_data:
  certbot_www:
  certbot_certs: